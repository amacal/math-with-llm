    - "Compared the multiplicative closure of numbers of form 4n+1 against numbers of form 4n+3, and of 3n+1 against 3n+2, to determine which residue classes admit a direct Euclid/Lemma-2.15-style contradiction proof and which require a harder order-based argument."
