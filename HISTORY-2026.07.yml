  - date: 2026-07-16
    title: "Quadratic Residues & the Legendre Symbol via Euler's Criterion"
    session:
      file: src/bin/mod-legendre.rs
      source: —
      status: completed
      attempted:
        - Implement a Legendre symbol test deciding whether a is a quadratic residue mod prime p, via Euler's Criterion.
      explored:
        - Derived the exactly-two-to-one structure of the squaring map mod p.
        - Investigated the relationship between the primitive-root-power form (-1)^k and the general a^((p-1)/2) form of Euler's Criterion.
        - Considered adding modular square root extraction to the same function; scoped out as separate future work.
      tried:
        - Derived x^2 = (p-x)^2 (mod p) algebraically.
        - Derived that x^2 = y^2 (mod p) implies x = +-y (mod p), via z = x * y^-1.
        - Verified the counting argument and Euler's Criterion concretely for p=7, including via powers of the primitive root g=3.
      corrections:
        - Initial algebra for (p-x)^2 had a sign error (p(p-2x-q) instead of p(p-2x+q)); corrected on request to recheck the sign.
        - Initial derivation of z^2=1 from x^2=y^2 conflated squaring y^-1 with multiplying by y^-1 once; corrected via a concrete numeric trace (p=7, x=3, y=4) before redoing the algebra.
        - An arithmetic slip in that same trace (3x2 stated as 1 instead of 6) was corrected on request to recheck the product.
        - The QR-to-sign pairing (QR maps to +1, non-residue to -1) was stated backwards twice during the closing correctness recap, despite an earlier correct concrete computation (2^3 mod 7 = 1 for QR a=2); corrected by being pointed back to that computation.
      bugs_found:
        - None in the submitted implementation; both tests passed on first run. Traced but left unaddressed: for p=1 or p=2, integer division makes (p-1)/2 equal to 0, so mod_exp always returns 1 regardless of the base, making legendre(0,2) return Some(1) instead of Some(0); accepted as a consequence of the documented p-must-be-an-odd-prime precondition rather than fixed with a runtime check.
      completed:
        - Derived the exact count of quadratic residues mod p and Euler's Criterion from first principles, using a primitive root to establish the converse direction.
        - Implemented and tested src/bin/mod-legendre.rs (2 tests passing), computing the Legendre symbol via Euler's Criterion.
        - Added a code comment documenting the p-must-be-an-odd-prime precondition.
      not_completed:
        - Did not implement modular square root extraction (Tonelli-Shanks); scoped out as a separate future session.
      open_questions: —
      notes:
        - Reimplemented the square-and-multiply routine fresh in this file rather than importing it from Modular Exponentiation, per this repo's no-code-reuse rule.

  - date: 2026-07-16
    title: "Newton's Method for General Root-Finding"
    session:
      file: src/bin/root-newton-general.rs
      source: —
      status: completed
      attempted:
        - Generalize the isqrt Newton update to an arbitrary differentiable f with a supplied derivative f'.
        - Determine whether Newton's method converges unconditionally for a general f.
      explored:
        - Derived the general update rule x1 = x0 - f(x0)/f'(x0) from point-slope form and checked it reduces to the isqrt-specific formula for f(x) = x^2 - n.
        - Investigated convergence behavior for f(x) = x^3 - x starting away from any of its three roots.
        - Introduced Taylor's theorem to generalize the quadratic-convergence proof beyond the isqrt-specific case.
        - Investigated what a function-value stopping check versus a step-size stopping check each actually guarantee near a root of multiplicity k.
      tried:
        - Started the x^3 - x iteration at x0 = 1/sqrt(5).
        - Checked convergence using a function-value stopping criterion (|f(x)| < eps).
        - Checked convergence using a step-size stopping criterion (|x1 - x0| < eps).
        - Tested against a double root, f(x) = (x-1)^2.
      corrections:
        - Initially expected Newton's method to converge to the nearest root of x^3 - x; found instead that starting at x0 = 1/sqrt(5) produces an exact eternal two-cycle x0, -x0, x0, -x0 that never reaches any of the three real roots.
        - Initially assumed a function-value stopping check (|f(x)| < eps) guarantees eps precision; corrected after testing against the double root f(x) = (x-1)^2, which only guaranteed eps^(1/k) precision near a root of multiplicity k.
      bugs_found:
        - The function-value-based stopping check under-guaranteed precision near a multiplicity-k root (only eps^(1/k), not eps); replaced with a step-size check (|x1-x0| < eps), which does not degrade with multiplicity.
      completed:
        - Implemented a general Newton root-finder taking f and f' as closures, with a hard iteration cap.
        - Added 10 tests covering a simple polynomial root, both simple roots and the non-convergent case of x^3 - x, and the double-root precision case.
        - Verified empirically that the double-root case reaches about 7.8e-7 precision in 7 iterations against a requested tolerance of 1e-6, using the step-size check.
      not_completed:
        - Did not trace the second iteration of the cube-root-of-2 worked example fully by hand.
      open_questions: —
      notes:
        - Confirmed the general update rule specializes exactly to the isqrt-specific formula when f(x) = x^2 - n.

  - date: 2026-07-13
    title: "Linear Congruential Generator"
    session:
      file: src/bin/rand-lcg.rs
      source: —
      status: completed
      attempted:
        - Implement LCG variants for fixed-width integer state spaces (u8, u16, u64).
        - Determine when the generator visits every state exactly once before repeating (full period).
      explored:
        - Hand-traced all four multipliers coprime to 8 for modulus m=8.
        - Compared observed periods against the Hull-Dobell conditions.
        - Connected the finite deterministic state evolution to the eventual-cycling argument from the Pell's Equation session.
        - Considered how an invertible step map affects predictability of the output stream.
      tried:
        - Used ordinary modular arithmetic for the u8 and u16 cases.
        - Initially represented the full-width u64 modulus using the literal u64::MAX.
      corrections:
        - Initially treated u64::MAX as equivalent to modulus 2^64; corrected this because u64::MAX = 2^64 - 1.
        - Initially assumed the Hull-Dobell factor-4 condition scales with the modulus; corrected it to a fixed condition on the number 4 itself, independent of modulus size.
      bugs_found:
        - The initial u64 implementation used the literal 18446744073709551615 (u64::MAX) as the modulus instead of 2^64 itself, silently making the modulus odd and defeating the intended free-wraparound optimization; fixed by using a zero-sentinel meaning "skip the modulo, rely on native u64 wraparound."
      completed:
        - Implemented u8, u16, and u64 LCG variants.
        - Exhaustively verified full-period behavior for the u8 and u16 moduli.
      not_completed:
        - Did not add a direct-enumeration full-period test for the u64 (2^64) modulus case, since iterating through 2^64 states is computationally infeasible; relies on the Hull-Dobell argument alone.
      open_questions: —
      notes:
        - Native u64 wraparound was used to model modulus 2^64 without an explicit % operation.

  - date: 2026-07-13
    title: "Wiener's Attack on RSA"
    session:
      file: src/bin/mod-rsa-wiener.rs
      source: —
      status: completed
      attempted:
        - Recover RSA's private exponent d and factor n from the public key alone, exploiting a small d.
      explored:
        - Investigated the algebraic relationship among e, d, and phi(n) implied by RSA key generation.
        - Compared the session's derived bound on d against the published literature bound.
        - Checked Legendre's theorem concretely against previously computed sqrt(2) convergents (17/12 and 10/7).
      tried:
        - Chose RSA primes near 2^30 to keep phi(n) within the existing extended-GCD implementation's i64 range.
        - Tested a large-d case (d = 200000) expected to fall outside the derived bound.
        - Recovered candidate p, q via Vieta's formulas and a discriminant perfect-square check for each continued-fraction convergent of e/n.
      corrections:
        - Initially called the continued-fraction generator on the private exponent d instead of the public modulus n; corrected once recognized this used information a real attacker would not have.
      bugs_found:
        - The existing extended-GCD routine's i64 Bezout coefficients overflowed once phi(n) approached u64::MAX with primes near 2^32; worked around by choosing smaller primes near 2^30 instead of widening the coefficient type.
        - Squaring p+q before subtracting 4n could overflow u64; fixed by widening that multiplication to u128, matching the existing pattern in mod_exp.
        - An early version called the continued-fraction generator on the private exponent d instead of n, which "solved" the attack using information the attacker would not have; caught before being mistaken for a working implementation.
      completed:
        - Implemented the attack: convergent search, phi(n) candidate recovery, and p/q recovery via the quadratic discriminant.
        - Verified against a worked example with p=97, q=101, d=7, recovering the exact factors from the public key alone.
        - Confirmed the large-d test case (d=200000) returns no candidate, as expected given the derived bound.
      not_completed:
        - Did not widen the extended-GCD Bezout-coefficient type to i128; used smaller primes instead as a scope decision.
      open_questions: —
      notes:
        - Derived bound d < n^(1/4)/sqrt(2), looser than the literature's n^(1/4)/3 but the same order of magnitude.

