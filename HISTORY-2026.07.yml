  - date: 2026-07-18
    title: "BigInteger Division"
    session:
      file: src/bin/big-uint-division.rs
      source: —
      status: completed
      attempted:
        - Implement division for the BigNumber arbitrary-precision type via schoolbook long division (Knuth's Algorithm D), as the first step of a longer stated arc toward Wiener's attack on RSA using BigIntegers at realistic key sizes.
      explored:
        - Confirmed Karatsuba Multiplication is not a genuine prerequisite for division, since the algorithm only ever multiplies a single u64 digit against the full divisor, never two multi-limb numbers against each other.
        - Investigated whether Binary GCD (Stein's Algorithm) could be done on BigIntegers before division exists at all, as a possible detour before Euclidean GCD; left as an open, undecided fork point.
        - Investigated the general normalization-factor formula in isolation from the specific base-10 example that first motivated it, distinguishing the proven Knuth Algorithm D formula from a naive halving formula that only worked by coincidence in the degenerate leading-digit-1 case.
        - Investigated a from-scratch technique for computing floor(2^64 / d) using only native u64 arithmetic (via u64::MAX and a remainder-equality correction), as a hypothetical for languages without a 128-bit integer type; not used in the final implementation, which uses u128 directly.
      tried:
        - Attempted an ad hoc doubled-halved-base normalization formula to avoid a potential overflow; set aside after finding configurations where its safety margin could not be verified by hand, in favor of exact u128 arithmetic.
        - Verified several intermediate computations (the normalization factor, a window value, a multiplication result) against independent Python bignum arithmetic before accepting or rejecting a hypothesis about where a bug lived.
      corrections:
        - Initially assumed the normalization factor was simply half the base divided by the leading digit; corrected once a non-trivial leading digit (13) was found to undershoot the required half-base threshold due to integer truncation, in favor of the proven base/(leading_limb+1) formula.
        - Initially believed the correction loop's `candidate >= window` comparison was correct; corrected to `candidate > window` once an exact match (remainder zero) was found to be wrongly decremented.
        - Initially computed the digit-extraction loop's window offset as a fixed formula assuming the scaled dividend always had at least one spare limb beyond the divisor; corrected to an unconditional single-leading-zero pad after two distinct failures (equal-length underflow, one-limb-longer silent wrong window) traced to this assumption.
      bugs_found:
        - The digit-extraction loop's "bring down the next limb" step read the wrong dividend index, initially re-reading a limb already inside the current window instead of the next unused one; fixed by correcting the index formula.
        - The correction loop's overshoot check used `candidate >= window` instead of `candidate > window`, wrongly decrementing an exact match; fixed by changing the comparator.
        - The window-offset computation `dividend.len() - divisor.len() - 1` panicked with a usize subtraction overflow whenever the scaled dividend and scaled divisor had equal limb counts; fixed by unconditionally padding the scaled dividend with one leading zero limb before computing this offset.
        - A raw quotient-digit estimate could reach base, base+1, or base+2 before being cast to u64, silently wrapping instead of erroring; fixed by capping the estimate at u64::MAX before the correction loop.
        - The dividend-padding condition was initially conditional on `dividend.len() == other.len()` (comparing the scaled dividend against the unscaled divisor's length), so it failed to trigger for a dividend exactly one limb longer than the scaled divisor and for a dividend with ample spare limbs that still needed the pad; fixed by making the pad unconditional on every call.
        - A carry-propagation bug in `Mul<u64> for &BigNumber`: the carry from adding a limb's low mul128 output into `data[idx]` was deferred to `carries[idx+2]` instead of `carries[idx+1]`, corrupting results whenever that carry fired; found via a 9-limb-dividend/8-limb-divisor test case, confirmed independently against a Python simulation, and fixed by correcting the index.
      completed:
        - Implemented `Div for &BigNumber` returning `Option<BigNumber>`, computing the quotient via normalization, a leading-limb estimate capped at u64::MAX, a bounded correction loop, and an unconditional leading-zero-padded window.
        - Added tests covering division by one, exact division, single-limb divisors with and without cross-limb carry, multi-limb divisors (up to 8 limbs against a 9-limb dividend, and 4 limbs against a 7-limb dividend), a divisor larger than the dividend, dividend/divisor of equal limb length and of nearly-equal magnitude, a dividend divided by itself, division by a power of two, and two large stress tests (100 limbs by 78 limbs, and 1000 limbs by 345 limbs).
        - Verified all tests pass after fixing the carry-propagation bug in `Mul<u64>`.
      not_completed:
        - The remainder is not exposed by the current `Div` implementation, only the quotient.
        - BigInteger GCD (Euclidean algorithm), now unlocked by this session's division, was not started.
        - BigInteger modular exponentiation, BigInteger Miller-Rabin primality test, BigInteger RSA at realistic key sizes, BigInteger continued-fraction convergents, BigInteger integer square root, and Wiener's attack on BigInteger RSA — the remaining named steps of the stated arc — were not started.
        - Whether to detour through BigInteger Binary GCD before Euclidean GCD (since Binary GCD needs only subtraction and bit-shifts, both already available) was raised and left undecided.
      open_questions:
        - Whether the next session should implement BigInteger GCD directly via the Euclidean algorithm (reusing this session's division) or take the Binary GCD detour first.
      notes:
        - The seven remaining steps of the arbitrary-precision arc (BigInteger GCD, modular exponentiation, Miller-Rabin, RSA, continued fractions, integer square root, Wiener's attack) were all named explicitly in conversation before this session's coding began, not invented after the fact.

  - date: 2026-07-17
    title: "Secant Method for Root-Finding"
    session:
      file: src/bin/root-secant.rs
      source: —
      status: completed
      attempted:
        - Derive a root-finding update rule that replaces Newton's exact derivative with a slope estimated from two prior points.
        - Determine the resulting order of convergence relative to bisection and Newton's method.
      explored:
        - Derived the secant slope as a finite-difference stand-in for f'(x0) and substituted it into Newton's update rule to obtain the secant update rule.
        - Re-derived the Taylor-expansion error argument from `root-newton.md` for two error terms instead of one, arriving at a recurrence relating each new error to the product of the two previous errors.
        - Assumed a self-similar power-law relationship between consecutive errors and solved the resulting characteristic equation for the order of convergence, identifying it as the golden ratio.
        - Recast bisection's convergence order in the same power-law form used for secant and Newton, for comparison, since the original bisection session had not framed it that way.
        - Derived the O(log log(1/eps)) iteration-count bound from the power-law ansatz by taking logarithms twice.
        - Investigated whether the secant method requires its two starting points to bracket a sign change, and contrasted with regula falsi (method of false position).
        - Investigated why f(x) = x^3 + x converges to exactly 0 under `root-newton.rs` but to approximately 2.3e-19 under `root-secant.rs`.
      tried:
        - Hand-traced the update rule on f(x) = x^3 - 2 from x0=1, x1=1.5 through x2 and x3, and compared error ratios e_{n+1}/e_n^2 against e_{n+1}/(e_n*e_{n-1}) to distinguish the two candidate recurrences.
        - Tested the implementation against f(x) = x^3 - x starting near 1/sqrt(5), the same region that produced an infinite two-cycle under Newton's method.
        - Tested the implementation against a double root, f(x) = (x-1)^2, near x0=1.0001, x1=1.0005.
        - Traced both failing tests numerically outside the implementation (via a scratch Python script) to diagnose root cause before changing any assertions.
      corrections:
        - Initially wrote the Taylor expansion with a sign error on the linear term (f(x) = f(a) - f'(a)(x-a) + ...); corrected after checking against a concrete example, f(x)=x^2 at a=1.
        - Initially wrote the general secant/Newton point-slope relation with x and y swapped (x1-x0 = m(y1-y0)); corrected after checking against concrete points (0,0) and (1,2).
        - Initially expected the test starting near 1/sqrt(5) for f(x) = x^3 - x to return None (non-convergence, by analogy with Newton's oscillation there); traced the iteration and found it does converge, chaotically, to the legitimate root at 0, so the test's expected outcome was changed from None to Some.
        - Initially asserted the double-root test's precision at the same 1e-6 tolerance passed into the function; traced the iteration and found the step-to-step ratio near the double root is only about 0.6 (linear, not superlinear, convergence, since f'(r)=0 there), inflating the true error above the step-size-based stopping check by a factor of about 1.5; the assertion tolerance was loosened to 1e-5 to reflect this.
      bugs_found:
        - Test root_of_x_cube_minus_x_at_1_by_sqrt_5 asserted the wrong expected outcome (None instead of Some); corrected after tracing the actual iterates.
        - Test root_of_x_minus_1_square_at_1_0001 asserted a precision (1e-6) tighter than the double root's degraded convergence rate actually supports; corrected to 1e-5.
      completed:
        - Implemented src/bin/root-secant.rs with find_root(f0, x0, x1, eps, n) -> Option<f64>, guarding both x0==x1 and f(x0)==f(x1) before dividing.
        - Added 11 tests covering simple roots of x^3+x and x^3-2, multiple bracketing pairs for x^3-x (including near-symmetric points and points close to the oscillation region), and a double root of (x-1)^2 at two different starting scales.
        - Renamed src/bin/root-newton-general.rs/.md to src/bin/root-newton.rs/.md and propagated the filename correction to INDEX.yml and this file's prior entry.
        - Verified all 11 tests pass after correcting the two failing assertions.
      not_completed:
        - Did not apply the identified optimization of caching/cycling y0,y1 alongside x0,x1 to avoid recomputing one function value per iteration; left as a known inefficiency by explicit choice.
      open_questions: —
      notes:
        - Traced both failing tests using a standalone Python script in the scratchpad directory, not by editing the Rust implementation, to diagnose behavior before deciding how to fix the tests.

