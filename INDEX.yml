# ---------------------------------------------------------------------------
# edges: non-obvious, inferred, ambiguous, or historically-important relationships that a session
# field alone would understate. Not a duplicate of the session fields above — see each session's
# related_to for the lighter-weight version of some of these.
# ---------------------------------------------------------------------------
edges:
  - from: "Karatsuba Multiplication"
    to: "BigInteger Division"
    type: not_a_prerequisite
    confidence: explicit
    evidence:
      - "src/bin/big-uint-division.md Overview: \"Karatsuba Multiplication ... is not a genuine prerequisite here, since every multiplication this algorithm performs multiplies a single 64-bit digit against the full divisor, never two multi-limb numbers against each other, so there is no asymptotic reason to reach for a subquadratic multiplication algorithm.\" Recorded explicitly since Karatsuba is the chronologically most recent session in the same prior branch and could otherwise be mistaken for a prerequisite."
  - from: "Trial Division Factorization"
    to: "Pollard's Rho Factoring Algorithm"
    type: related
    confidence: explicit
    evidence:
      - "HISTORY-2026.07.md: Trial Division entry, \"contrasted explicitly against the O(n^(1/4)) cost of the Pollard's-Rho-based factorize\" — a same-problem comparison, not a prerequisite; trial division is the simpler of the two algorithms."
  - from: "Pell's Equation via Continued Fractions"
    to: "Linear Congruential Generator"
    type: related
    confidence: explicit
    evidence:
      - "HISTORY-2026.07.md: LCG entry, \"the pigeonhole-plus-determinism argument from the Pell's equation session, generalized here\" — a borrowed side-argument for LCG's eventual-periodicity remark, not a prerequisite for its core Hull-Dobell result."
  - from: "Segmented Sieve"
    to: "Integer Square Root"
    type: related
    confidence: explicit
    evidence:
      - "src/bin/mod-isqrt-bisect.md Overview: \"motivated directly by a floating-point sqrt precision bug flagged in the segmented sieve's notes\"."
      - "HISTORY-2026.07.md: Integer Square Root's own Depends-on field says \"motivated by, but not technically dependent on\" — historical inspiration, not a prerequisite."
  - from: "Karatsuba Multiplication"
    to: "Number Theoretic Transform (NTT)"
    type: related
    confidence: explicit
    evidence:
      - "src/bin/poly-mul-ntt.md Complexity section: contrasts NTT's T(n)=2T(n/2)+O(n) Master-theorem boundary case against Karatsuba's T(n)=3T(n/2)+O(n) recursive-work-dominates case."
  - from: "Sieve of Eratosthenes"
    to: "Primitive Roots mod p"
    type: related
    confidence: explicit
    evidence:
      - "src/bin/mod-primitive-root.md Complexity section: reuses the Mertens'-theorem density argument from the sieve session to bound the candidate search, without requiring the sieve algorithm itself."
  - from: "Number Theory Step by Step, Section 1.4: Linear Diophantine Equations"
    to: "Number Theory Step by Step, Section 2.1: Introduction to Primes"
    type: derived_from
    confidence: explicit
    evidence:
      - "HISTORY-2026.07.md: Section 1.4's Supplementary Problem 1.23 explicitly flags prime factorization as \"not yet covered as a proven theorem\" in this repo; Section 2.1, three days later, closes exactly that gap by proving the Fundamental Theorem of Arithmetic."
  - from: "Baby-Step Giant-Step (Discrete Logarithm)"
    to: "Primitive Roots mod p"
    type: derived_from
    confidence: explicit
    evidence:
      - "src/bin/mod-bsgs.md \"Finding a generator\" section: the safe-prime two-check shortcut (g^2, g^((p-1)/2)) is explicitly named as the special case that Primitive Roots mod p later generalizes to any prime via Lagrange's theorem."
  - from: "Miller-Rabin Primality Test"
    to: "Quadratic Residues & the Legendre Symbol via Euler's Criterion"
    type: related
    confidence: explicit
    evidence:
      - "src/bin/mod-legendre.md: the fact that x^2=1 (mod p) has exactly two roots, first proved in Miller-Rabin's notes, is cited (not re-derived) and used twice — once to show the squaring map is exactly two-to-one, once to show a^((p-1)/2) is confined to {1,-1}."
  - from: "Miller-Rabin Primality Test"
    to: "Tonelli-Shanks Algorithm for Modular Square Roots"
    type: derived_from
    confidence: explicit
    evidence:
      - "src/bin/mod-tonelli-shanks.md \"Decomposing p minus 1\" section: reuses Miller-Rabin's n-1=2^s*d peel-off-powers-of-two decomposition directly as p-1=Q*2^S, and reuses its repeated-squaring search technique (there searching for a nontrivial root of 1, here searching for the exponent i such that t's order is 2^i)."
