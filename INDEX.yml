# INDEX.yml — derived, compact knowledge graph over HISTORY-YYYY.MM.yml and src/bin/*.md.
# Non-authoritative: if this ever disagrees with the history or notes files, they win — rebuild this file from them.
# Every session is keyed by its exact Concept Title (the string used in its HISTORY heading), never by filename,
# since book-study sessions have no filename. Empty list fields use "—", matching HISTORY-YYYY.MM.md convention.
# reuses_code is "—" for every session by design: this repo's hard constraint forbids code reuse across
# src/bin/*.rs files (each problem reimplements what it needs), so no session ever literally shares code with
# another. code_reuse_index is therefore empty on principle, not from incomplete auditing.
# Schema: see CLAUDE.md's "Fast index (INDEX.yml)" section for field semantics and the confidence/evidence model.

metadata:
  generated_from:
    - HISTORY-2026.06.yml
    - HISTORY-2026.07.yml
    - src/bin/*.md
    - src/bin/*.rs
  authoritative: false
  purpose: "compact LLM-readable learning knowledge graph"
  schema_version: 2
  generated_at: "2026-07-19"
  session_count: 36
  note: "Rebuilt from scratch against HISTORY-2026.06.yml and HISTORY-2026.07.yml (source of truth) plus every src/bin/*.md notes file, not by mechanically relabeling the prior depends_on/unlocks fields. See CLAUDE.md for the schema this file follows."

